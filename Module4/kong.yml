_format_version: "3.0"

services:

  - name: order-service
    url: http://module2a:5000
    routes:
      - name: order-route
        paths:
          - /orders
    plugins:
      - name: rate-limiting
        config:
          minute: 100

  - name: report-service
    url: http://module3:5002
    routes:
      - name: report-route
        paths:
          - /reports