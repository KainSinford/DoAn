version: "3.9"

services:
  # 🔹 MySQL (Orders DB)
  mysql:
    image: mysql:8
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: orders
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # 🔹 PostgreSQL (Finance DB)
  postgres:
    image: postgres:14
    container_name: postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 🔹 RabbitMQ (Message Broker)
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  # 🔹 Order API (Producer)
  order_api:
    build: ./module2/order_api
    container_name: order_api
    restart: always
    depends_on:
      - mysql
      - rabbitmq
    ports:
      - "5000:5000"
    environment:
      DB_HOST: mysql
      RABBITMQ_HOST: rabbitmq

  # 🔹 Order Worker (Consumer)
  order_worker:
    build: ./module2/order_worker
    container_name: order_worker
    restart: always
    depends_on:
      - mysql
      - postgres
      - rabbitmq
    environment:
      MYSQL_HOST: mysql
      POSTGRES_HOST: postgres
      RABBITMQ_HOST: rabbitmq

volumes:
  mysql_data:
  postgres_data:
